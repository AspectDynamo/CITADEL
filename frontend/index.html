<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomberg-style Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Bloomberg-style Dashboard</h1>
    </header>
    <main>
        <section class="markets">
            <h2>Market Data</h2>
            <div class="market-data">
                <!-- Market data cards go here -->
                <div class="market-card">Stock A: $100</div>
                <div class="market-card">Stock B: $150</div>
                <div class="market-card">Stock C: $200</div>
            </div>
        </section>
        <section class="news">
            <h2>Latest News</h2>
            <div class="news-item">Breaking News: Market hits all-time high!</div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 AspectDynamo</p>
    </footer>
</body>
</html>
